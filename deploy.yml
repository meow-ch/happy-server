version: 2

instances:
  prod:
    branches: [master]
    targets: [sn208133]
    deploy_key_scope: standalone-sn208133
    secrets_mode: node_vault_agent
    vault:
      runtime_path: prod/tenants/meow/apps/boujot/happy-server/prod
    vault_agent:
      expected_files:
        - env
    build:
      context: .
      tags: [latest, "${DRONE_COMMIT_SHA}"]
      images:
        - name: server
          image_env: DOCKER_IMAGE
          dockerfile: Dockerfile
    compose:
      remote_dir: /home/drone/apps/happy-server
      project_name: happy-server
      file: docker-compose.yml
    # Automatic health-check rollback can restart a lease-unaware binary after
    # protocol-v1 state exists. Verify manually and recover by rolling forward.
    healthcheck_exempt: true
