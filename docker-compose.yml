services:
  app:
    image: ${DOCKER_IMAGE}:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 45s
    environment:
      - DATABASE_URL
      - REDIS_URL
      - SOCKET_IO_REDIS_CHANNEL_PREFIX
      - SESSION_MESSAGE_NOTIFICATION_REDIS_CHANNEL
      - S3_HOST
      - S3_PORT
      - S3_USE_SSL
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_BUCKET
      - S3_PUBLIC_URL
      - JWT_SECRET
      - HANDY_MASTER_SECRET
    networks:
      - shared_network
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ROUTER_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_NAME}.tls.certresolver=myresolver"
      - "traefik.http.services.${ROUTER_NAME}.loadbalancer.server.port=3005"
      - "traefik.docker.network=shared_network"
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: registry.sn1994.zivili.ch/library/postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=happy
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=happy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: registry.sn1994.zivili.ch/library/redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - volatile-ttl
    volumes:
      - redis_data:/data
    networks:
      - internal

  minio:
    image: registry.sn1994.zivili.ch/library/minio-minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - internal

  minio-init:
    image: registry.sn1994.zivili.ch/library/minio-mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb local/$${S3_BUCKET} --ignore-existing;
      mc anonymous set download local/$${S3_BUCKET};
      exit 0;
      "
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    networks:
      - internal

volumes:
  postgres_data:
    name: happy_postgres_data
    external: true
  minio_data:
    name: happy_minio_data
    external: true
  redis_data:
    name: happy_redis_data

networks:
  shared_network:
    external: true
  internal:
